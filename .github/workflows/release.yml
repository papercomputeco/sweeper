name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o sweeper-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o sweeper-linux-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o sweeper-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o sweeper-darwin-arm64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sweeper-linux-amd64
            sweeper-linux-arm64
            sweeper-darwin-amd64
            sweeper-darwin-arm64
